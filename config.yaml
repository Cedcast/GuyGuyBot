# Central configuration for GuyGuyBot
# Replace all placeholder values before running.
# API keys can also be set via environment variables (see .env.example).

telegram:
  bot_token: "YOUR_BOT_TOKEN_HERE"
  chat_id: "YOUR_CHAT_ID_HERE"
  stats_schedule:
    weekly: true
    monthly: true
    quarterly: true

database:
  path: "data/guybot.db"   # override with DATABASE_PATH env var (e.g. /data/guybot.db on Render)

trading:
  pairs:
    - "BTCUSDT"
    - "ETHUSDT"
    - "BNBUSDT"
    - "XRPUSDT"
    - "SOLUSDT"
    - "ADAUSDT"
    - "DOGEUSDT"
  risk_per_trade: 0.01   # 1% of account per trade
  account_size: 1000.0   # USD paper account size

engines:
  scalping:
    enabled: true
    timeframes: ["30m", "1h"]
    scan_interval: 900    # seconds between scans (quarter of the shortest candle)
  swing:
    enabled: true
    timeframes: ["4h", "1d"]
    scan_interval: 3600   # seconds between scans

exchanges:
  enabled: ["binance", "bybit", "okx", "kraken"]
  ohlcv_source: "binance"
  price_aggregation: "average"

llm:
  # Tier 1 — fast screeners (always called on every candidate)
  screener_agents: ["gpt4o", "grok"]
  screener_confidence_gate: 0.65   # Both screeners must hit this to invoke Claude

  # Tier 2 — final decision maker (only called when both screeners agree)
  decision_agent: "claude"

  # Model names (swap claude_model to claude-sonnet-4-5 to save more cost)
  gpt4o_model: "gpt-4o-mini"
  grok_model: "grok-3-mini"
  claude_model: "claude-opus-4-5"

  # API keys - replace with your actual keys or set via environment variables
  claude_api_key: "YOUR_CLAUDE_API_KEY"
  gpt4o_api_key: "YOUR_GPT4O_API_KEY"
  grok_api_key: "YOUR_GROK_API_KEY"

news:
  enabled: true
  cache_ttl_seconds: 300
  cryptopanic_token: "Pub"   # Public token, no key needed
  lunarcrush_api_key: ""     # get free key at lunarcrush.com (optional)
  sentiment_warning_threshold: -0.5
  fear_greed_warning_threshold: 20

paper_trading:
  enabled: true
  start_date: null    # set at runtime
  note: "30-day paper trading period. No real orders executed."
